name: Deploy MathJax Site

on:
  push:
    branches: ["main"] # Or your default branch name

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install mathjax-full jsdom cheerio

      - name: Install Tailwind 
        run: npm install -D tailwindcss@3

      - name: Render Equations to SVGs
        run: node tex_to_svg.mjs

      - name: Write Tailwind Styles
        run: npx tailwindcss -i ./src/styles.css -o ./dist/styles.css

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This points to the folder where your rendered HTML is saved
          path: './dist' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4